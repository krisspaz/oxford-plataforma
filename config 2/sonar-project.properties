# SonarQube Properties

# Project identification
sonar.projectKey=oxford-plataforma
sonar.projectName=Oxford Plataforma
sonar.projectVersion=2.0.0

# Source code location
sonar.sources=.
sonar.exclusions=**/vendor/**,**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.spec.js,**/*.test.js

# Test reports
sonar.tests=.
sonar.test.inclusions=**/*.test.js,**/*.spec.js,**/*Test.php
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.php.coverage.reportPaths=backend/symfony/coverage.xml
sonar.python.coverage.reportPaths=backend/ai_service/coverage.xml

# Code encoding
sonar.sourceEncoding=UTF-8

# Quality Gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Branch analysis
# sonar.branch.name=main
