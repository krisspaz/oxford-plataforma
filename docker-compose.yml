version: '3.8'

services:
  # === DATABASE ===
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: '!ChangeMe!'
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_net

  # === BACKEND (Symfony) ===
  backend:
    build:
      context: ./backend/symfony
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://app:!ChangeMe!@database:5432/app?serverVersion=16&charset=utf8
      APP_ENV: dev
      APP_SECRET: oxford2025secretkey
      CORPOSISTEMAS_API_URL: https://api.corposistemas.gt
      CORPOSISTEMAS_API_KEY: demo_key_oxford
      CORPOSISTEMAS_NIT: 12345678
    depends_on:
      - database
    volumes:
      - ./backend/symfony:/var/www/symfony
    networks:
      - app_net

  # === FRONTEND (React) ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - app_net

  # === AI SERVICE (Python) ===
  ai_service:
    build:
      context: ./backend/ai_service
      dockerfile: Dockerfile
    networks:
      - app_net

  # === GATEWAY (Nginx) ===
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./backend/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend/symfony/public:/var/www/symfony/public
    depends_on:
      - backend
      - frontend
      - ai_service
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  db_data:
