version: '3.8'

services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: oxford_prod
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secureproductionpassword
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend/symfony
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://admin:secureproductionpassword@database:5432/oxford_prod
    depends_on:
      - database

  nginx:
    image: nginx:alpine
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
