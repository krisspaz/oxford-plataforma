services:
  # ================= FRONTEND =================
  - type: web
    name: oxford-frontend
    env: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile.render
    dockerContext: .
    branch: main
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://oxford-gateway.onrender.com/api # Point to Gateway
      - key: VITE_AI_URL
        value: https://oxford-gateway.onrender.com/ai  # Point to Gateway

  # ================= GATEWAY (NEW) =================
  - type: web
    name: oxford-gateway
    env: docker
    plan: free
    dockerfilePath: ./backend/gateway/Dockerfile
    dockerContext: .
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 80

  # ================= BACKEND =================
  - type: web
    name: oxford-backend
    env: docker
    plan: starter
    dockerfilePath: ./backend/symfony/Dockerfile.render
    dockerContext: .
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: oxford-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: oxford-redis
          property: connectionString
      - key: CORS_ALLOW_ORIGIN
        value: https://oxford-frontend.onrender.com # Frontend still needs CORS from Backend
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_PUBLIC_KEY
        generateValue: true
      - key: JWT_PASSPHRASE
        generateValue: true
      - key: AI_SERVICE_URL
        value: http://oxford-ai:8000
      - key: AI_INTERNAL_KEY
        generateValue: true

  # ================= IA =================
  - type: web
    name: oxford-ai
    env: docker
    plan: starter
    dockerfilePath: ./backend/ai_service/Dockerfile.render
    dockerContext: .
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    # startCommand removed per previous fix, rely on Dockerfile CMD
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: oxford-redis
          property: connectionString
      - key: AI_INTERNAL_KEY
        fromService:
          name: oxford-backend
          type: web
          envVarKey: AI_INTERNAL_KEY

  # ================= REDIS =================
  - type: redis
    name: oxford-redis
    plan: free
    ipAllowList: []

databases:
  - name: oxford-db
    databaseName: oxford
    user: oxford_user
    plan: free
