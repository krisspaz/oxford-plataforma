name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  # ==========================================
  # FRONTEND TESTS
  # ==========================================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Lint
        working-directory: frontend
        run: npm run lint || true
      
      - name: Type check
        working-directory: frontend
        run: npm run type-check || true
      
      - name: Unit tests
        working-directory: frontend
        run: npm run test -- --coverage
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: frontend/coverage/coverage-final.json
          flags: frontend

  # ==========================================
  # BACKEND TESTS
  # ==========================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: oxford_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, redis
          coverage: xdebug
      
      - name: Cache Composer
        uses: actions/cache@v3
        with:
          path: vendor
          key: composer-${{ hashFiles('backend/symfony/composer.lock') }}
      
      - name: Install dependencies
        working-directory: backend/symfony
        run: composer install --no-progress --prefer-dist
      
      - name: PHPStan
        working-directory: backend/symfony
        run: vendor/bin/phpstan analyse src --level=5 || true
      
      - name: PHPUnit
        working-directory: backend/symfony
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/oxford_test
        run: vendor/bin/phpunit --coverage-clover coverage.xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: backend/symfony/coverage.xml
          flags: backend

  # ==========================================
  # AI SERVICE TESTS
  # ==========================================
  ai-test:
    name: AI Service Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/ai_service/requirements.txt
      
      - name: Install dependencies
        working-directory: backend/ai_service
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
      
      - name: Lint
        working-directory: backend/ai_service
        run: |
          pip install ruff
          ruff check . || true
      
      - name: Tests
        working-directory: backend/ai_service
        run: pytest --cov=. --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: backend/ai_service/coverage.xml
          flags: ai-service

  # ==========================================
  # SECURITY SCAN
  # ==========================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
      
      - name: Dependency check
        run: |
          cd frontend && npm audit --audit-level=high || true
          cd ../backend/symfony && composer audit || true

  # ==========================================
  # BUILD & DEPLOY
  # ==========================================
  build:
    name: Build
    needs: [frontend-test, backend-test, ai-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      
      - name: Build Docker images
        run: |
          docker build -t oxford-frontend:${{ github.sha }} ./frontend
          docker build -t oxford-backend:${{ github.sha }} ./backend/symfony
          docker build -t oxford-ai:${{ github.sha }} ./backend/ai_service
      
      - name: Push to registry
        if: github.event_name == 'push'
        run: |
          echo "Push to container registry..."
          # docker push ghcr.io/krisspaz/oxford-frontend:${{ github.sha }}

  deploy-staging:
    name: Deploy to Staging
    needs: [build]
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # kubectl apply -f k8s/staging/

  deploy-production:
    name: Deploy to Production
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # kubectl apply -f k8s/production/

# ==========================================
# NOTIFICATIONS
# ==========================================
  notify:
    name: Notify
    needs: [build]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
