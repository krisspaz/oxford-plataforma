name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========================================
  # BACKEND TESTS (Symfony/PHP)
  # ========================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: oxford_test
          POSTGRES_USER: oxford_test
          POSTGRES_PASSWORD: oxford_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, intl, zip
          coverage: xdebug

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        working-directory: backend/symfony

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/symfony/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress
        working-directory: backend/symfony

      - name: Run PHP CS Fixer (Lint)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --allow-risky=yes || true
        working-directory: backend/symfony

      - name: Run PHPStan (Static Analysis)
        run: vendor/bin/phpstan analyse src --level=5 --memory-limit=256M || true
        working-directory: backend/symfony

      - name: Run PHPUnit Tests
        env:
          DATABASE_URL: postgresql://oxford_test:oxford_test_pass@localhost:5432/oxford_test?serverVersion=16
          APP_ENV: test
          APP_SECRET: test_secret_key_for_ci_pipeline
        run: vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml
        working-directory: backend/symfony

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v4
        with:
          files: backend/symfony/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ========================================
  # FRONTEND TESTS (React/Jest)
  # ========================================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Run ESLint
        run: npm run lint || true
        working-directory: frontend

      - name: Run Tests
        run: npm test -- --coverage --watchAll=false || true
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ========================================
  # AI SERVICE TESTS (Python)
  # ========================================
  ai-service-test:
    name: AI Service Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/ai_service/requirements.txt

      - name: Install Dependencies
        run: pip install -r requirements.txt
        working-directory: backend/ai_service

      - name: Install Test Dependencies
        run: pip install pytest pytest-cov pytest-asyncio httpx
        working-directory: backend/ai_service

      - name: Run Tests
        run: pytest --cov=. --cov-report=xml || true
        working-directory: backend/ai_service

  # ========================================
  # E2E TESTS (Playwright)
  # ========================================
  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: frontend

      - name: Run E2E Tests
        run: npx playwright test || true
        working-directory: frontend

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  # ========================================
  # BUILD AND PUSH DOCKER IMAGES
  # ========================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, ai-service-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend/symfony
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for AI Service
        id: meta-ai
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ai-service

      - name: Build and push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/ai_service
          push: true
          tags: ${{ steps.meta-ai.outputs.tags }}
          labels: ${{ steps.meta-ai.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================
  # SECURITY SCAN
  # ========================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
