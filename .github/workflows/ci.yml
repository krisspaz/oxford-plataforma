name: Corpo Oxford CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, intl, pdo, pdo_sqlite
        
    - name: Install Backend Dependencies
      run: |
        cd backend/symfony
        composer install --prefer-dist --no-progress
        
    - name: Run Backend Smoke Tests
      run: |
        cd backend/symfony
        # Use SQLite for testing
        echo "DATABASE_URL='sqlite:///%kernel.project_dir%/var/test.db'" > .env.test.local
        php bin/console doctrine:database:create --env=test
        php bin/console doctrine:schema:create --env=test
        php bin/phpunit tests/Integration/SmokeTest.php

  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Run Frontend Tests
      run: |
        cd frontend
        npm test run
        
    - name: Lint Frontend
      run: |
        cd frontend
        npm run lint
