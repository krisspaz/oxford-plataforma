server {
    listen 80;
    server_name localhost;

    # Frontend (React)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API (Symfony)
    location /api {
        # fastcgi_pass backend:9000;
        # For simple Setup with Nginx, usually we proxy to another nginx or use php-fpm directly.
        # Since backend container is PHP-FPM, we need to handle PHP execution here or have a sidecar nginx.
        # SIMPLIFICATION: We will change backend container to have its own nginx or use direct fastcgi routing.
        
        # PROPER SETUP for PHP-FPM downstream:
        fastcgi_pass backend:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/symfony/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/symfony/public;
    }
    
    location /bundles {
        alias /var/www/symfony/public/bundles;
    }

    # AI Service (FastAPI)
    location /ai {
        proxy_pass http://ai_service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
