events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Upstream definitions (Internal Render DNS)
    upstream backend_service {
        server oxford-backend:80; 
    }

    upstream ai_service {
        server oxford-ai:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # Health Check
        location /health {
            return 200 'Gateway Healthy';
            add_header Content-Type text/plain;
        }

        # Proxy to Symfony Backend
        location /api {
            proxy_pass http://backend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS (handled at gateway level usually, or passed through)
            # We'll pass through and let Backend handle it, 
            # OR we can handle it here. Let's pass through for now to avoid double-headers.
        }

        # Proxy to AI Service
        location /ai {
            rewrite ^/ai/(.*) /$1 break; # Strip /ai prefix
            proxy_pass http://ai_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
