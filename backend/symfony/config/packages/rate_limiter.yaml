framework:
    rate_limiter:
        # Define 2 rate limiters: one for anonymous login attempts, one for authenticated API calls
        anonymous_api:
            policy: fixed_window
            limit: 60
            interval: 60 minutes
        
        authenticated_api:
            policy: sliding_window
            limit: 1000
            interval: 60 minutes
        
        app_login_limiter:
            policy: fixed_window
            limit: 5
            interval: 1 minute
