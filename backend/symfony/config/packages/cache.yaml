framework:
    cache:
        # Unique name of your app: used to compute stable namespaces for cache keys.
        prefix_seed: oxford_sistema

        # Use Redis for caching in production
        app: cache.adapter.redis
        default_redis_provider: 'redis://redis:6379'

        # Cache pools for different purposes
        pools:
            # Schedule cache - longer TTL
            cache.schedule:
                adapter: cache.adapter.redis
                default_lifetime: 3600  # 1 hour

            # API response cache - short TTL
            cache.api_response:
                adapter: cache.adapter.redis
                default_lifetime: 300  # 5 minutes

            # AI results cache - medium TTL
            cache.ai_results:
                adapter: cache.adapter.redis
                default_lifetime: 600  # 10 minutes

            # User session cache
            cache.user_session:
                adapter: cache.adapter.redis
                default_lifetime: 1800  # 30 minutes
